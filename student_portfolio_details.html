<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Details - ICMS College</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .profile-img {
            width: 100%;
            border-radius: 10px;
        }

        .section-title {
            border-left: 5px solid #0d6efd;
            padding-left: 10px;
            margin-bottom: 15px;
        }

        .info-box p {
            margin-bottom: 6px;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="Student_Portfolio.html">← Back to Students</a>
    </div>
</nav>

<div class="container my-5">

    <div class="row">

        <!-- LEFT: Student Image -->
        <div class="col-md-4">
            <img id="studentImage" class="profile-img shadow">
        </div>

        <!-- RIGHT: Student Details -->
        <div class="col-md-8">

            <h2 id="studentName"></h2>
            <p id="studentCourse" class="text-muted"></p>

            <hr>

            <div class="info-box">
                <p><strong>Semester:</strong> <span id="studentSemester"></span></p>
                <p><strong>Batch:</strong> <span id="studentBatch"></span></p>
                <p><strong>Trade:</strong> <span id="studentTrade"></span></p>
                <p><strong>Percentage:</strong> <span id="studentMarks"></span></p>
            </div>

            <!-- About -->
            <div class="mt-4">
                <h5 class="section-title">About Student</h5>
                <p id="studentBio"></p>
            </div>

            <!-- Achievements -->
            <div class="mt-4">
                <h5 class="section-title">Achievements</h5>
                <ul id="studentAchievements"></ul>
            </div>

            <!-- Project -->
            <div class="mt-4">
                <h5 class="section-title">Project Details</h5>
                <p id="studentProject"></p>
            </div>

        </div>

    </div>

</div>



<!-- Script -->
<script>

// Get ID from URL
const id = new URLSearchParams(window.location.search).get("id");
const s = data[id];

// Set Data
document.getElementById("studentName").innerText = s.name;
document.getElementById("studentCourse").innerText = s.course;
document.getElementById("studentSemester").innerText = s.semester;
document.getElementById("studentBatch").innerText = s.batch;
document.getElementById("studentTrade").innerText = s.trade;
document.getElementById("studentMarks").innerText = s.marks;
document.getElementById("studentImage").src = s.image;
document.getElementById("studentBio").innerText = s.bio;
document.getElementById("studentProject").innerText = s.project;

// Achievements list
const list = document.getElementById("studentAchievements");
s.achievements.forEach(a => {
    let li = document.createElement("li");
    li.innerText = a;
    list.appendChild(li);
});
</script>

</body>
</html>
